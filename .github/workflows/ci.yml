name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python scripts/generate_contracts.py --check
      - run: pytest --cov=planguard --cov-report=term-missing
      - run: python -m pip wheel . --no-deps --wheel-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/*.whl

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/workbench-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/workbench-ui/package-lock.json
      - run: npm install
      - run: npm run build
