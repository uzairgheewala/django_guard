services:
  workbench-api:
    image: python:3.13-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PLANGUARD_STORE: /workspace/examples/store
      DJANGO_DEBUG: "1"
    command: >-
      sh -c "pip install -e '.[api]' &&
      python services/workbench_api/manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"

  workbench-ui:
    image: node:22-alpine
    working_dir: /workspace/apps/workbench-ui
    volumes:
      - .:/workspace
    environment:
      VITE_PLANGUARD_API_BASE: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - workbench-api
